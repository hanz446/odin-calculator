<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link href="styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="main-container">
        <div id="display-container">
            <div id="secondary-display"></div>
            <div id="main-display">0</div>
        </div>
        <div id="button-container">
            <div class="left-side">
                <button type="button" data-type="misc" data-value="backspace" class="number button">&#9003;</button>
                <button type="button" data-type="misc" data-value="clear" class="number button">AC</button>
                <button type="button" data-type="misc" data-value="percent" class="number button">%</button>
                <button type="button" data-type="number" data-value="7" class="number button">7</button>
                <button type="button" data-type="number" data-value="8" class="number button">8</button>
                <button type="button" data-type="number" data-value="9" class="number button">9</button>
                <button type="button" data-type="number" data-value="4" class="number button">4</button>
                <button type="button" data-type="number" data-value="5" class="number button">5</button>
                <button type="button" data-type="number" data-value="6" class="number button">6</button>
                <button type="button" data-type="number" data-value="1" class="number button">1</button>
                <button type="button" data-type="number" data-value="2" class="number button">2</button>
                <button type="button" data-type="number" data-value="3" class="number button">3</button>
                <button type="button" data-type="misc" data-value="toggle" class="number button">+/-</button>
                <button type="button" data-type="number" data-value="0" class="number button">0</button>
                <button type="button" data-type="misc" data-value="decimal" class="number button">.</button>
            </div>
            <div class="right-side">
                <button type="button" data-type="operator" data-value="divide" class="operator button">&divide;</button>
                <button type="button" data-type="operator" data-value="multiply" class="operator button">&times;</button>
                <button type="button" data-type="operator" data-value="subtract" class="operator button">-</button>
                <button type="button" data-type="operator" data-value="plus" class="operator button">+</button>
                <button type="button" data-type="equals" data-value="equals" class="operator button">=</button>
            </div>
        </div>
    </div>
</body>
</html>
